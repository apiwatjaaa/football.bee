<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SQUAD FORGE — Football Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://unpkg.com/mobile-drag-drop/default.min.css">
<script src="https://unpkg.com/mobile-drag-drop/index.min.js"></script>
<script src="https://unpkg.com/mobile-drag-drop/scroll-behaviour-hack.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<body>

<header>
  <div class="logo">SQUAD<span>FORGE</span></div>
  <div class="header-actions">
    <button class="btn btn-teal" onclick="exportPitch()">📸 Share Squad</button>
    <button class="btn btn-ghost" onclick="clearPitch()">Clear</button>
  </div>
</header>

<div class="app">
  <div class="bench">
    <div class="panel-header">
      <div class="panel-title">SQUAD BENCH</div>
      <div class="panel-sub" id="bench-count">0 players available</div>
    </div>
    
    <div class="bench-filters">
      <input type="text" id="filter-name" class="filter-input" placeholder="Search name..." oninput="renderBench()">
      <select id="filter-pos-group" class="filter-select" onchange="renderBench()">
        <option value="ALL">All Pos</option>
        <option value="FWD">FWD (หน้า)</option>
        <option value="MID">MID (กลาง)</option>
        <option value="DEF">DEF (หลัง)</option>
        <option value="GK">GK (ประตู)</option>
      </select>
    </div>

    <div class="bench-list" id="bench-list"></div>
    <div class="bench-dropzone" id="bench-dropzone">↩ Drop to bench</div>
  </div>

  <div class="pitch-area" id="pitch-area">
    <div class="pitch-controls">
      <div class="pitch-controls-left">
        <div class="formation-badge">
          <div class="badge-dot"></div>
          <span class="formation-label" id="formation-label">4-3-3</span>
        </div>
        <select class="formation-select" id="formation-select" onchange="changeFormation(this.value)">
          <option value="433">4-3-3</option>
          <option value="442">4-4-2</option>
          <option value="4231">4-2-3-1</option>
          <option value="352">3-5-2</option>
          <option value="532">5-3-2</option>
        </select>
      </div>
      
      <div class="team-rating-badge" title="Team Overall Rating">
        <span class="team-rating-label">Team OVR</span>
        <span class="team-rating-val" id="team-ovr-val">-</span>
      </div>

      <div class="pitch-controls-right">
        <button class="btn btn-ghost" onclick="resetFormation()" title="Reset to default positions">↺</button>
        <button class="btn btn-edit" id="btn-edit-mode" onclick="toggleEditMode()">EDIT POSITIONS</button>
      </div>
    </div>

    <div class="pitch-wrap" id="pitch-capture-area">
      <div class="pitch" id="pitch">
        <svg class="pitch-lines" viewBox="0 0 320 480" fill="none">
          <rect x="16" y="12" width="288" height="456" stroke="rgba(255,255,255,0.45)" stroke-width="1.5" rx="2"/>
          <line x1="16" y1="240" x2="304" y2="240" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <circle cx="160" cy="240" r="40" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <circle cx="160" cy="240" r="2.5" fill="rgba(255,255,255,0.6)"/>
          <rect x="78" y="12" width="164" height="62" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <rect x="110" y="12" width="100" height="26" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <circle cx="160" cy="54" r="2" fill="rgba(255,255,255,0.5)"/>
          <rect x="78" y="406" width="164" height="62" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <rect x="110" y="442" width="100" height="26" stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
          <circle cx="160" cy="426" r="2" fill="rgba(255,255,255,0.5)"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="creator-panel">
    <div class="panel-header">
      <div class="panel-title">PLAYER CREATOR</div>
      <div class="panel-sub">Build your player</div>
    </div>
    <div class="creator-body">
      <div class="form-group">
        <label class="form-label">Player Image (Optional)</label>
        <input class="form-input" id="inp-img" type="file" accept="image/*">
        <div class="img-preview-box" id="img-preview"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Player Name</label>
        <input class="form-input" id="inp-name" type="text" placeholder="e.g. Marco Rossi" maxlength="28">
      </div>
      <div class="form-group">
        <label class="form-label">Position</label>
        <select class="form-select" id="inp-pos">
          <option value="GK">GK — Goalkeeper</option>
          <option value="CB" selected>CB — Centre Back</option>
          <option value="LB">LB — Left Back</option>
          <option value="RB">RB — Right Back</option>
          <option value="CDM">CDM — Def. Midfielder</option>
          <option value="CM">CM — Central Midfielder</option>
          <option value="CAM">CAM — Att. Midfielder</option>
          <option value="LM">LM — Left Midfielder</option>
          <option value="RM">RM — Right Midfielder</option>
          <option value="LW">LW — Left Winger</option>
          <option value="RW">RW — Right Winger</option>
          <option value="ST">ST — Striker</option>
          <option value="CF">CF — Centre Forward</option>
        </select>
      </div>
      <div class="section-divider">Attributes</div>
      <div class="stats-grid" id="stats-grid"></div>
      <div class="ovr-preview">
        <div class="ovr-big" id="ovr-display">75</div>
        <div class="ovr-label">Overall Rating</div>
      </div>
      <button class="btn-create" onclick="createPlayer()">CREATE PLAYER</button>
    </div>
  </div>
</div>

<div class="drag-ghost" id="drag-ghost"></div>

<div class="modal-overlay" id="delete-modal">
  <div class="modal">
    <h2>REMOVE PLAYER</h2>
    <p id="delete-modal-msg">Are you sure you want to delete this player?</p>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('delete-modal')">Cancel</button>
      <button class="btn" style="flex:1;background:var(--red);color:#fff" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="player-detail-modal">
  <div class="modal modal-detail" style="text-align: center;">
    <div id="detail-img" class="card-avatar" style="width: 70px; height: 70px; margin: 0 auto 5px; font-size: 24px;"></div>
    <h2 id="detail-name" style="margin-bottom: 2px;">Name</h2>
    <div id="detail-pos-ovr" style="color: var(--gold); font-family: var(--font-display); font-size: 20px; margin-bottom: 12px;">POS - 99</div>
    
    <div class="radar-chart-frame">
      <div class="radar-chart-container">
        <canvas id="radarChart"></canvas>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('player-detail-modal')">Close</button>
      <button class="btn btn-danger" style="flex:1" onclick="removePlayerFromPitch()">Remove from Pitch</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
